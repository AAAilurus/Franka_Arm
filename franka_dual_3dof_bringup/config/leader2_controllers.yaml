leader2:
  controller_manager:
    ros__parameters:
      use_sim_time: true
      update_rate: 1000
      joint_state_broadcaster.type: joint_state_broadcaster/JointStateBroadcaster
      fixed_joints_hold.type: joint_trajectory_controller/JointTrajectoryController
      arm_3dof_cmd.type: forward_command_controller/ForwardCommandController

  joint_state_broadcaster:
    ros__parameters:
      use_sim_time: true

  fixed_joints_hold:
    ros__parameters:
      use_sim_time: true
      joints:
        - leader2_fr3_joint1
        - leader2_fr3_joint2
        - leader2_fr3_joint6
        - leader2_fr3_joint7
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      allow_partial_joints_goal: false
      allow_nonzero_velocity_at_trajectory_end: false
      constraints:
        stopped_velocity_tolerance: 0.001
        goal_time: 0.5
      gains:
        leader2_fr3_joint1: {p: 200.0, d: 20.0, i: 0.0, i_clamp: 0.0}
        leader2_fr3_joint2: {p: 200.0, d: 20.0, i: 0.0, i_clamp: 0.0}
        leader2_fr3_joint6: {p: 200.0, d: 20.0, i: 0.0, i_clamp: 0.0}
        leader2_fr3_joint7: {p: 200.0, d: 20.0, i: 0.0, i_clamp: 0.0}

  arm_3dof_cmd:
    ros__parameters:
      use_sim_time: true
      joints:
        - leader2_fr3_joint3
        - leader2_fr3_joint4
        - leader2_fr3_joint5
      interface_name: effort
